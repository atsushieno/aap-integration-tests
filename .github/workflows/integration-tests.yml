name: integration-tests

# Cross-repo AAP integration tests: download prebuilt host + plugin APKs by commit
# from GitHub Actions artifacts, install on a CI emulator, run the default suite.
#
# PREREQUISITES before this can go green:
#   1. Repository secret AAP_ARTIFACTS_PAT — a GitHub PAT with artifact-read access
#      to all source repos named by catalogs/*.json. The default GITHUB_TOKEN
#      cannot read other repositories' Actions artifacts.
#   2. The catalog pins must point to commits whose artifacts still exist or
#      are already present in this repo's .work/cache. If not, `acquire` fails
#      with a clear "no successful run" / "artifact not available" error.
#
# uapmd requires API 31+ (minSdk 31), so this workflow must not use an API 30
# emulator.
#
# Emulator: provided by reactivecircus/android-emulator-runner (handles KVM, image
# install, boot, caching). Our own `gmd` device provider is the local no-device
# path; on CI we reuse the action's emulator via `--device auto`.

on:
  workflow_dispatch:
    inputs:
      uninstall_packages:
        description: >
          Space-separated Android package names to uninstall from the cached AVD
          before the test run (e.g. org.androidaudioplugin.aaphostsample).
          Use this when a host or plugin APK is stale in the AVD cache.
        required: false
        default: ''
      avd_cache_suffix:
        description: >
          Optional suffix appended to the AVD cache key to force a completely
          fresh emulator (busts the cached userdata image). Use when the AVD
          itself is corrupt or you need a clean slate. Leave blank for normal runs.
        required: false
        default: ''
  schedule:
    - cron: '0 6 * * *'   # nightly
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'catalogs/**'
      - 'tests/**'
      - 'package.json'
      - '.github/scripts/**'
      - '.github/workflows/integration-tests.yml'

jobs:
  suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install

      - name: Node preflight
        run: npm run unit

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # KVM is required for a hardware-accelerated x86_64 emulator on Linux runners.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache AVD
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api35-google_apis-x86_64${{ inputs.avd_cache_suffix && format('-{0}', inputs.avd_cache_suffix) || '' }}

      - name: Cache downloaded APK artifacts
        uses: actions/cache@v4
        with:
          path: .work/cache
          key: aap-itest-apks-${{ hashFiles('catalogs/*.json') }}
          restore-keys: |
            aap-itest-apks-

      - name: Run integration suite on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -no-snapshot -no-audio -no-boot-anim -gpu swiftshader_indirect -camera-back none -partition-size 4096 -memory 4096
          disable-animations: true
          # The emulator is up here; `--device auto` reuses it. The default suite
          # downloads every catalog it needs from artifacts (PAT via GITHUB_TOKEN below).
          script: bash .github/scripts/run-integration-suite.sh
        env:
          # acquire.js reads GITHUB_TOKEN; this PAT can read cross-repo artifacts.
          GITHUB_TOKEN: ${{ secrets.AAP_ARTIFACTS_PAT }}
          # Space-separated packages to uninstall before the run (workflow_dispatch only).
          UNINSTALL_PACKAGES: ${{ inputs.uninstall_packages || '' }}

      - name: Upload integration diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-diagnostics
          path: .work/ci/
          if-no-files-found: ignore
